site_name: WYSIWYG Test
plugins:
  - live-edit
  - live-wysiwyg:
      autoload_wysiwyg: true         # set to false to start with plain textarea
  - mkdocs-nav-weight
theme:
  features:
    - content.code.annotate
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
