name: Release

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/download-utilities.yml'
      - 'techdocs-preview.sh'
      - 'example-docs/**'
      - 'mkdocs_live_wysiwyg_plugin/**'
      - 'pyproject.toml'
      - 'vsx-src/**'

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip when the last commit is a release commit to avoid re-running after we push
    if: "${{ !contains(github.event.head_commit.message, 'chore: release') }}"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv from .github/download-utilities.yml
        run: |
          YML_INSTALL_FILES_VERSION="v3.8"
          curl -fsSL -o download-utilities.sh "https://raw.githubusercontent.com/samrocketman/yml-install-files/${YML_INSTALL_FILES_VERSION}/download-utilities.sh"
          chmod +x download-utilities.sh
          ./download-utilities.sh .github/download-utilities.yml uv
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Set up Python
        run: uv python install 3.10

      - name: Bump version
        run: uv version --bump patch

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '^version = "\K[^"]+' pyproject.toml)" >> $GITHUB_OUTPUT

      - name: Update WYSIWYG_VERSION in techdocs-preview.sh
        run: sed -i 's/^WYSIWYG_VERSION=[.0-9]*/WYSIWYG_VERSION=${{ steps.version.outputs.version }}/' techdocs-preview.sh

      - name: Sync download-utilities.yml into techdocs-preview.sh
        run: |
          python3 << 'PYEOF'
          with open('techdocs-preview.sh') as f:
              script = f.read()
          with open('.github/download-utilities.yml') as f:
              yaml_content = f.read()
          start_marker = "cat <<'UV_DOWNLOAD_YAML'\n"
          end_marker = "\nUV_DOWNLOAD_YAML"
          start_idx = script.index(start_marker) + len(start_marker)
          end_idx = script.index(end_marker, start_idx)
          script = script[:start_idx] + yaml_content.rstrip('\n') + script[end_idx:]
          with open('techdocs-preview.sh', 'w') as f:
              f.write(script)
          PYEOF

      - name: Sync example-docs init_data into techdocs-preview.sh
        run: |
          python3 << 'PYEOF'
          import subprocess
          with open('techdocs-preview.sh') as f:
              script = f.read()
          result = subprocess.run(
              'tar -c --format=ustar mkdocs.yml docs | gzip -9 | base64',
              shell=True, capture_output=True, text=True, cwd='example-docs'
          )
          result.check_returncode()
          start_marker = "cat << 'EO_EXAMPLE_DOCS'\n"
          end_marker = "\nEO_EXAMPLE_DOCS"
          start_idx = script.index(start_marker) + len(start_marker)
          end_idx = script.index(end_marker, start_idx)
          script = script[:start_idx] + result.stdout.rstrip('\n') + script[end_idx:]
          with open('techdocs-preview.sh', 'w') as f:
              f.write(script)
          PYEOF

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml techdocs-preview.sh
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

      - name: Push
        run: |
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv from .github/download-utilities.yml
        run: |
          YML_INSTALL_FILES_VERSION="v3.8"
          curl -fsSL -o download-utilities.sh "https://raw.githubusercontent.com/samrocketman/yml-install-files/${YML_INSTALL_FILES_VERSION}/download-utilities.sh"
          chmod +x download-utilities.sh
          ./download-utilities.sh .github/download-utilities.yml uv
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Set up Python
        run: uv python install 3.10

      - name: Build package
        run: uv build --no-sources

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/mkdocs-live-wysiwyg-plugin
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  vsix-build:
    runs-on: ubuntu-latest
    needs: pypi-publish
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build VSIX
        run: make -C vsx-src build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vsx-src/dist/*.vsix

  vsix-publish:
    runs-on: ubuntu-latest
    needs: vsix-build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsx-src/dist/

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '^version = "\K[^"]+' pyproject.toml)" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        run: make -C vsx-src publish-github TAG=v${{ steps.version.outputs.version }} GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      # TODO: enable after setting up VSCE_PAT secret
      # - name: Publish to VS Code Marketplace
      #   run: make -C vsx-src publish-marketplace VSCE_PAT=${{ secrets.VSCE_PAT }}

      # TODO: enable after setting up OVSX_PAT secret
      # - name: Publish to Open VSX
      #   run: make -C vsx-src publish-openvsx OVSX_PAT=${{ secrets.OVSX_PAT }}
