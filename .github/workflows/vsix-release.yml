name: VSIX Release (Manual)

on:
  workflow_dispatch:

jobs:
  vsix-build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build VSIX
        run: make -C vsx-src build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vsx-src/dist/*.vsix

  vsix-publish:
    runs-on: ubuntu-latest
    needs: vsix-build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsx-src/dist/

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '^version = "\K[^"]+' pyproject.toml)" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        run: make -C vsx-src publish-github TAG=v${{ steps.version.outputs.version }} GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      # TODO: enable after setting up VSCE_PAT secret
      # - name: Publish to VS Code Marketplace
      #   run: make -C vsx-src publish-marketplace VSCE_PAT=${{ secrets.VSCE_PAT }}

      # TODO: enable after setting up OVSX_PAT secret
